italic_font       IosevkaTerm Nerd Font Mono Italic
bold_italic_font  IosevkaTerm Nerd Font Mono Bold Italic
font_size 12

foreground #DCD7BA
background #1F1F28

selection_foreground #1F1F28
selection_background #7E9CD8

cursor #DCD7BA
cursor_text_color #1F1F28

url_color #7E9CD8

# black
color0 #54546D
color8 #54546D

# red
color1 #C34043
color9 #C34043

# green
color2 #76946A
color10 #76946A

# yellow
color3 #C0A36E
color11 #C0A36E

# blue
color4 #7E9CD8
color12 #7E9CD8

