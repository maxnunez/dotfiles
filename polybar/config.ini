[colors]
bg = #1F1F28
fg = #DCD7BA
blue = #7E9CD8
red = #C34043
green = #76946A
yellow = #C0A36E
cyan = #6A9589
magenta = #957FB8
dim = #54546D

[bar/main]
width = 100%
height = 28
offset-x = 0
offset-y = 0
radius = 0
fixed-center = true

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 2
line-color = ${colors.dim}

border-size = 0
padding-left = 2
padding-right = 2
module-margin = 1

font-0 = IosevkaTerm Nerd Font Mono:size=11;2
font-1 = IosevkaTerm Nerd Font Mono:size=11;2

modules-left = i3
modules-center = title
modules-right = date

cursor-click = pointer
; cursor-scroll no es compatible en esta versión

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = %name%
label-focused-background = ${colors.blue}
label-focused-foreground = ${colors.bg}
label-focused-padding = 2
label-unfocused = %name%
label-unfocused-foreground = ${colors.dim}
label-unfocused-padding = 2
label-visible = %name%
label-visible-foreground = ${colors.fg}
label-visible-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.bg}
label-urgent-padding = 2
label-separator = 
separator = false
strip-wsnumbers = true

[module/title]
type = internal/xwindow
format = <label>
label = %title:0:40:...%
label-foreground = ${colors.fg}
label-maxlen = 40

[module/date]
type = internal/date
interval = 1
date = %a %d %b  %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.fg}

[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0
